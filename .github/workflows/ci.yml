name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

# Cancel an older CI run on the same ref when a newer one is pushed.
# `release.yml` keeps cancel-in-progress: false because it must finish, but
# CI-only runs are safe (and helpful) to cancel — otherwise stale runs hold
# runner slots and an `aube ci` from a previous commit can race with the new
# install that just landed in the fresh checkout.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Resolve aube store path
        shell: bash
        run: echo "AUBE_STORE=$(aube store path 2>/dev/null || echo $HOME/.local/share/aube/store)" >> "$GITHUB_ENV"

      - name: Setup aube cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUBE_STORE }}
          key: ${{ runner.os }}-aube-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-store-

      - name: Install dependencies
        run: aube ci

      - name: Run Biome check
        # Use `aube run check` explicitly: bare `aube check` resolves to aube's
        # built-in dependency-tree verifier (`Verify that every installed package
        # can resolve its declared deps...`), not our biome script.
        run: aube run check

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Resolve aube store path
        shell: bash
        run: echo "AUBE_STORE=$(aube store path 2>/dev/null || echo $HOME/.local/share/aube/store)" >> "$GITHUB_ENV"

      - name: Setup aube cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUBE_STORE }}
          key: ${{ runner.os }}-aube-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-store-

      - name: Install dependencies
        run: aube ci

      - name: Type check
        run: aube type-check

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, curl
          coverage: none

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Resolve aube store path
        shell: bash
        run: echo "AUBE_STORE=$(aube store path 2>/dev/null || echo $HOME/.local/share/aube/store)" >> "$GITHUB_ENV"

      - name: Setup aube cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUBE_STORE }}
          key: ${{ runner.os }}-aube-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-store-

      - name: Install dependencies
        run: aube ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: apps/sabredav

      - name: Run unit and integration tests
        env:
          NODE_ENV: test
        run: aube test

  danger:
    name: Danger PR Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Resolve aube store path
        shell: bash
        run: echo "AUBE_STORE=$(aube store path 2>/dev/null || echo $HOME/.local/share/aube/store)" >> "$GITHUB_ENV"

      - name: Setup aube cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUBE_STORE }}
          key: ${{ runner.os }}-aube-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-store-

      - name: Install dependencies
        run: aube ci

      - name: Run Danger
        run: npx danger ci
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Resolve aube store path
        shell: bash
        run: echo "AUBE_STORE=$(aube store path 2>/dev/null || echo $HOME/.local/share/aube/store)" >> "$GITHUB_ENV"

      - name: Setup aube cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUBE_STORE }}
          key: ${{ runner.os }}-aube-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-store-

      - name: Install dependencies
        run: aube ci

      - name: Build all workspaces
        run: aube build
